name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # Step 1: analyse commits and manage the release PR.
  release-please:
    runs-on: ubuntu-22.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name:        ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file:   release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Auto-merge release PR
        run: |
          PR=$(gh pr list --repo "$GITHUB_REPOSITORY" \
                --head "release-please--branches--main" \
                --state open --json number --jq '.[0].number')
          if [ -n "$PR" ] && [ "$PR" != "null" ]; then
            echo "Merging release PR #$PR"
            gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --merge
          else
            echo "No open release PR found"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Step 2: when the release PR is merged, build the ZIP and attach it.
  build-zip:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          path: courseradar

      - name: Update Moodle internal version to today
        run: |
          MOODLE_VER=$(date +%Y%m%d)00
          sed -i "s/\$plugin->version.*=.*;/\$plugin->version   = $MOODLE_VER;/" courseradar/version.php

      - name: Build installable ZIP
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          ZIPNAME="report_courseradar-${TAG}.zip"
          zip -r "$ZIPNAME" courseradar \
            --exclude "courseradar/.git/*" \
            --exclude "courseradar/.github/*" \
            --exclude "courseradar/.gitignore" \
            --exclude "courseradar/CONTRIBUTING.md" \
            --exclude "courseradar/Makefile" \
            --exclude "courseradar/.githooks/*" \
            --exclude "courseradar/release-please-config.json" \
            --exclude "courseradar/.release-please-manifest.json"

      - name: Attach ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: "*.zip"
